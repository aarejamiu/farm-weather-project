    <div class="container">
        <h1>Welcome to Your Dashboard</h1>
        <p>Here you can view your weather data, manage your profile, and access other
        features.</p>
    </div>

    <div class="container">
        <input type="text" id="search" placeholder="Enter farm location">
        <button id="getWeatherBtn">Get Weather</button>
    </div>

    <div id="weatherResult">
        <h3>Weather Information</h3>
        <p id="temp"></p>
        <p id="humidity"></p>
        <p id="wind"></p>
        <p id="condition"></p>
        <p id="location"></p>
    </div>
    <textarea id="note" placeholder="Add note (e.g Good for planting maize)"></textarea>
    <button id="saveBtn">Save Weather</button>

    <h3>Saved Dates</h3>
    <div id="savedDates"></div>
